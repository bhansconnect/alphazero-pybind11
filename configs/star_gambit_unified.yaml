game: star_gambit_unified

# This is a solid small-ish network.
# A bit bigger than the defaults.
spatial_policy: "on"
dense_net: false
depth: 4
channels: 64
kernel_size: 3

# These may not help, but are quite cheap and should reduce loss.
head_channels: 64
v_head_convs: 1
pi_head_convs: 1
v_fc_layers: 2

# MCTS
selfplay_mcts_visits: 120
fast_mcts_visits: 30
compare_mcts_visits: 30

# Gumbel is huge for strong learning signals.
gumbel_enabled: true
fast_search_algo: gumbel

# Per-variant half-life in player turns. ~17-20% of each variant's avg turn
# count (17.5 / 20 / 25 / 45), so all four reach near-final temp by end of game.
temp_decay_half_life:
  skirmish: 3
  showdown: 4
  clash: 5
  battle: 8
self_play_temp: 1.2
final_temp: 0.2

# self_play_concurrent_batch_mult: 4

frozen_eval_anchor_iters: [5, 50, 200]

# Historical elo comparisons. Negative = relative offset (legacy behavior:
# -20 means "vs 20 iters back"). Positive = absolute anchor iter (reuses the
# frozen_eval_anchor_iters checkpoints). Anchors auto-retire (stop firing
# in future iters) once their win rate saturates >= 0.97 or <= 0.03 -- their
# aim win_rate curves cleanly terminate at the last live iter.
compare_past: [-20, 5, 50, 200]

# Halve the historical-comparison batch size so the 4-entry compare_past
# above doesn't blow up iter wall-time vs the old single-entry default.
past_compare_batch_size: 32

# Training
# Step based schedule may need tuning, but adaptive tends to be too slow
# to update LR.
lr_schedule: step
lr_steps: [[0, 0.01], [60, 0.003], [150, 0.001], [300, 0.0003]]
iterations: 800

# Games-based window matching KataGo's growth curve. c=4096 games (one
# self-play iter's worth = bs * NUM_PLAYERS * concurrent_mult * chunks =
# 1024 * 2 * 2 * 1). KataGo's curve constants alpha=0.75, beta=0.4 give a
# smaller window early (faster turnover of weak early data) growing
# sublinearly toward our reference target.
window_size_unit: games
window_size_scalar_games: 4096
window_size_alpha: 0.75
window_size_beta: 0.4

# --- Multi-variant mixing ---
# Fraction of games (game_based) or samples (sample_based) per variant.
# Must sum to 1.0. Omit or set to {} for equal 25% weighting.
variant_fractions:
  skirmish: 0.25
  showdown: 0.25
  clash: 0.25
  battle: 0.25

# "game_based": use fractions directly as game selection probabilities.
# "sample_based": calibrate game probs each iteration so actual sample
#   fractions match targets (helps when variants have very different game lengths).
variant_mixing_mode: sample_based

# Variant weights for gating evaluation. Defaults to variant_fractions if omitted.
# Set explicitly to evaluate gating under a different distribution than training.
gating_variant_weights:
  skirmish: 0.25
  showdown: 0.25
  clash: 0.25
  battle: 0.25
