game: open_tafl

# OpenTafl is an 11x11 tafl variant (2662 moves, from-square x direction).
# The action space is fully spatial (channels = WIDTH + HEIGHT per square, no
# global actions), so use the spatial conv policy head.
spatial_policy: "on"
dense_net: false
depth: 4
channels: 64
kernel_size: 3

# Cheap head extensions that tend to reduce loss.
head_channels: 64
v_head_convs: 1
pi_head_convs: 1
v_fc_layers: 2

# MCTS
selfplay_mcts_visits: 120
fast_mcts_visits: 30
compare_mcts_visits: 30

# Asymmetric self-play search budget: boost the attacker (player 0) early to
# break the cold-start bootstrapping valley, annealing back to symmetric (the
# trained agent ends unbiased). Applies to both full and fast/capped searches.
# attacker full/fast: iters 0-9 = 360/90 (3x), 10-79 = 240/60 (2x),
#                     80-159 = 180/45 (1.5x), 160+ = 120/30 (symmetric).
selfplay_visit_multipliers: [[0, [4.0, 1.0]], [10, [2.0, 1.0]], [30, [1.5, 1.0]], [60, [1.0, 1.0]]]

# Gumbel gives a much stronger learning signal per search.
gumbel_enabled: true
fast_search_algo: gumbel

temp_decay_half_life: 12
self_play_temp: 1.2
final_temp: 0.2

# Training
train_sample_rate: 2
lr_schedule: step
lr_steps: [[0, 0.01], [60, 0.003], [150, 0.001], [300, 0.0003]]
iterations: 800

# resign_playthrough_percent: 0.99
